# Epic e01: Refactor docs to Good Docs + OKF — central knowledge hub

id: e01
slug: docs-refactor
title: Refactor docs to Good Docs + OKF — central knowledge hub
status: ready
created: 2026-07-13

description: |
  Transform docs/ from a loose collection of markdown files into a structured OKF bundle
  using Good Docs Project templates. Establish docs/ as the central knowledge hub that
  other repos inherit from — not just internal documentation for .github.

  Key decisions (from grill-with-docs session):
  - Good Docs Project templates provide body structure (concept, how-to, tutorial, reference, etc.)
  - OKF v0.1 provides frontmatter (type, title, description, tags, timestamp, provenance, story)
  - bigpowers conventions govern naming (Akita), size caps (Ousterhout), provenance, traceability
  - Diátaxis is deprecated in favor of Good Docs taxonomy
  - Two zones: knowledge hub (primary) + internal docs (secondary), same bundle

stories:
  - id: e01s01
    title: Bootstrap docs infrastructure — folder structure, OKF indexes, AGENTS.md update
    wsjf:
      bv: 8    # Unblocks all other work
      tc: 5    # Needed before other stories can reference structure
      rr: 8    # Eliminates structural drift risk
      js: 2    # 1 day — folder creation, index.md files, AGENTS.md update
      score: 10.5
    status: ready
    tasks:
      - name: Create Good Docs folder structure
        verify: "ls docs/concept docs/how-to docs/tutorial docs/reference docs/api-reference docs/troubleshooting docs/release-notes docs/style-guide docs/glossary"
        description: |
          Create all Good Docs template type folders under docs/:
          concept/, how-to/, tutorial/, reference/, api-reference/,
          troubleshooting/, release-notes/, style-guide/, glossary/
      - name: Create OKF bundle root index.md
        verify: "head -5 docs/index.md | grep -q '# .github Documentation'"
        description: |
          Write docs/index.md as the OKF bundle root — the portfolio entry point.
          Lists all sections with one-line descriptions linking to each doc.
          This is THE file other repos' agents consume.
      - name: Create OKF log.md
        verify: "head -3 docs/log.md | grep -q '# Documentation Update Log'"
        description: |
          Create docs/log.md following OKF §7 format — date-grouped entries, newest first.
          First entry: "2026-07-13 — **Initialization**: Migrated to Good Docs + OKF structure."
      - name: Create OKF index.md in each folder
        verify: "for d in docs/concept docs/how-to docs/tutorial docs/reference docs/api-reference docs/troubleshooting docs/release-notes docs/style-guide docs/glossary; do [ -f $d/index.md ] || echo MISSING: $d; done"
        description: |
          Create index.md in every docs/ subfolder. Placeholder content initially;
          will be auto-generated by scripts/generate-doc-indexes.sh in e01s05.
      - name: Rename tutorials/ to tutorial/
        verify: "[ -d docs/tutorial ] && [ ! -d docs/tutorials ]"
        description: |
          Rename docs/tutorials/ to docs/tutorial/ (singular, matching Good Docs).
          Update any internal links that reference the old path.
      - name: Remove compose/ and audit-history/ directories
        verify: "[ ! -d docs/compose ] && [ ! -d docs/reference/audit-history ]"
        description: |
          Dissolve compose/reports/consolidated-ci-cd-templates.md into reference/.
          Consolidate reference/audit-history/*.md into reference/audit-history.md.
      - name: Update AGENTS.md taxonomy
        verify: "grep -q 'Good Docs Project' AGENTS.md"
        description: |
          Replace Diátaxis reference with Good Docs Project + OKF in AGENTS.md.
          diff: "Docs follow Diátaxis structure" → "Docs follow Good Docs Project templates with OKF frontmatter"
      - name: Update CONVENTIONS.md docs section
        verify: "grep -q 'Good Docs' CONVENTIONS.md || echo 'No CONVENTIONS.md update needed'"
        description: |
          If CONVENTIONS.md references Diátaxis or docs structure, update to Good Docs + OKF.

  - id: e01s02
    title: Refactor existing docs to Good Docs templates + OKF frontmatter
    wsjf:
      bv: 5    # Quality improvement, not blocking
      tc: 3    # Can slip one sprint
      rr: 5    # Reduces inconsistency risk
      js: 5    # 1 week — 15+ files to convert
      score: 2.6
    status: ready
    depends_on: [e01s01]
    tasks:
      - name: Add OKF frontmatter to all existing docs
        verify: "for f in docs/concept/*.md docs/how-to/*.md docs/reference/*.md; do grep -q '^---' $f || echo MISSING_FRONTMATTER: $f; done"
        description: |
          Every .md file (except index.md and log.md) gets OKF frontmatter:
          type, title, description, tags, timestamp.
          type: values must match Good Docs template names (Concept, How-to, Reference, etc.)
      - name: Convert explanation/ docs to concept/ with Good Docs concept template
        verify: "grep -q 'type: Concept' docs/concept/bigpowers-methodology-overview.md"
        description: |
          Rename explanation/ → concept/. Apply Good Docs concept template sections:
          ## Overview, ## Glossary (if needed), ## {explanation topic}
          Rename bigpowers-learnings.md → bigpowers-methodology-overview.md (Akita: grep-unique)
      - name: Apply Good Docs how-to template to all how-to/ docs
        verify: "grep -q '## Before you start' docs/how-to/guard-git-safety-hooks.md"
        description: |
          Ensure every how-to doc has: ## Overview, ## Before you start,
          ## Step-by-step guide, ## See also
      - name: Apply Good Docs reference template to all reference/ docs
        verify: "grep -q '## Overview' docs/reference/branch-protection-rules.md"
        description: |
          Ensure every reference doc has: ## Overview, ## {structured entries}
          Tables, bulleted lists, or structured data.
      - name: Move contabo-vps-api.md from reference/ to api-reference/
        verify: "[ -f docs/api-reference/contabo-vps-api.md ] && [ ! -f docs/reference/contabo-vps-api.md ]"
        description: |
          Good Docs has api-reference/ as a separate template type.
          Move contabo-vps-api.md and apply Good Docs api-reference template sections.
      - name: Consolidate audit-history/ into reference/audit-history.md
        verify: "[ -f docs/reference/audit-history.md ] && [ ! -d docs/reference/audit-history ]"
        description: |
          Merge 2026-07-audit.md and 2026-07-contabo-api-research.md into
          a single reference/audit-history.md with date-grouped sections.
      - name: Apply Akita naming to all doc filenames
        verify: "echo 'Manual check: verify no filename returns >5 grep results across portfolio'"
        description: |
          Rename files that fail Akita's <5 grep rule:
          - bigpowers-learnings.md → bigpowers-methodology-overview.md
          - new-project-quickstart.md → github-quickstart.md
          Verify each rename with: grep -r '<old-name>' /Users/danielvm/Developer/ | wc -l
      - name: Fix inconsistent frontmatter values
        verify: "grep -r 'type: Explanation' docs/ || echo 'No Explanation types remain'"
        description: |
          Standardize type: values:
          - type: Explanation → type: Concept
          - type: explanation → type: Concept (lowercase → PascalCase)
          - type: how-to → type: How-to

  - id: e01s03
    title: Create knowledge hub entry points — start-new-project, portfolio-standards, portfolio-architecture
    wsjf:
      bv: 8    # THE primary deliverable — central knowledge hub
      tc: 5    # Needed for upcoming projects
      rr: 8    # Eliminates confusion about what provides what
      js: 3    # 2-3 days — 3 new docs
      score: 7.0
    status: ready
    depends_on: [e01s02]
    tasks:
      - name: Write how-to/start-new-project.md
        verify: "grep -q 'type: How-to' docs/how-to/start-new-project.md"
        description: |
          THE entry point for new repos. Good Docs how-to template:
          ## Overview, ## Before you start, ## Step-by-step guide (10 steps),
          ## See also. Links to portfolio-standards, agent-context-files,
          branch-protection, CI/CD templates, bigbase-deploy contract, brand tokens.
      - name: Write reference/portfolio-standards.md
        verify: "grep -q 'type: Reference' docs/reference/portfolio-standards.md"
        description: |
          Consolidated standards doc. Good Docs reference template:
          ## Overview, ## Agent context files (summary + link), ## Branch protection (summary + link),
          ## CI/CD templates (table: project type → template), ## Deploy contract (summary + link),
          ## Naming conventions, ## Git safety (summary + link).
      - name: Write concept/portfolio-architecture.md
        verify: "grep -q 'type: Concept' docs/concept/portfolio-architecture.md"
        description: |
          "What provides what" doc. Good Docs concept template:
          ## Overview, ## Glossary, ## The 4 layers (.github, bigpowers, brand, individual repo),
          ## What NOT to duplicate, ## How they connect.
      - name: Update docs/index.md with new docs
        verify: "grep -q 'start-new-project' docs/index.md"
        description: |
          Add links to start-new-project.md, portfolio-standards.md, portfolio-architecture.md
          in the appropriate sections of the bundle root index.

  - id: e01s04
    title: Add missing Good Docs template types — troubleshooting, release-notes, glossary
    wsjf:
      bv: 5    # Completes the template coverage
      tc: 3    # Can slip one sprint
      rr: 5    # Captures lessons learned
      js: 3    # 2-3 days — 4-5 new docs
      score: 4.3
    status: ready
    depends_on: [e01s02]
    tasks:
      - name: Write troubleshooting/ci-cd-common-failures.md
        verify: "grep -q 'type: Troubleshooting' docs/troubleshooting/ci-cd-common-failures.md"
        description: |
          Extract from 2026-07 audit findings. Good Docs troubleshooting template:
          ## Overview, ## Symptom → ## Cause → ## Fix (for each failure pattern).
          Patterns: broad permissions, no timeout, no concurrency, unpinned runners.
      - name: Write troubleshooting/deploy-health-check-failures.md
        verify: "grep -q 'type: Troubleshooting' docs/troubleshooting/deploy-health-check-failures.md"
        description: |
          Common deploy failures. Good Docs troubleshooting template.
          Symptoms: health check timeout, wrong app_type, missing token, 404 after deploy.
      - name: Write release-notes/2026-07-release.md
        verify: "grep -q 'type: Release Notes' docs/release-notes/2026-07-release.md"
        description: |
          Good Docs release-notes template. Covers: template consolidation,
          bigbase-deploy action, docs refactor, audit findings.
      - name: Write glossary/domain-terms.md
        verify: "grep -q 'type: Glossary' docs/glossary/domain-terms.md"
        description: |
          Good Docs glossary template. Terms: bigpowers, OKF, BCP, DORA, WSJF,
          Diátaxis, Good Docs Project, bigbase, guard-git, semantic-release, Conventional Commits.
      - name: Write style-guide/portfolio-writing-standards.md
        verify: "grep -q 'type: Style Guide' docs/style-guide/portfolio-writing-standards.md"
        description: |
          Good Docs style-guide template. Covers: OKF frontmatter convention,
          Good Docs template sections, Akita naming, Ousterhout size caps,
          provenance links, story tags.

  - id: e01s05
    title: Build auto-generation and validation tooling
    wsjf:
      bv: 5    # Prevents drift
      tc: 3    # Can slip one sprint
      rr: 8    # Eliminates manual index maintenance
      js: 3    # 2-3 days — 2 scripts
      score: 5.3
    status: ready
    depends_on: [e01s01]
    tasks:
      - name: Write scripts/generate-doc-indexes.sh
        verify: "bash scripts/generate-doc-indexes.sh && grep -q '##' docs/concept/index.md"
        description: |
          Scans each docs/ subfolder for .md files (excluding *-ref.md and index.md).
          Reads YAML frontmatter (title, description). Generates/overwrites index.md in each folder.
          Follows OKF §6 format: # Section heading, * [Title](file.md) - description.
      - name: Write scripts/validate-docs.sh
        verify: "bash scripts/validate-docs.sh && echo 'Validation passed'"
        description: |
          Validates docs/ against bigpowers soft rules:
          1. Every .md (except index.md, log.md) has YAML frontmatter with type: field
          2. type: values match Good Docs template names
          3. No file exceeds 120 lines (Ousterhout cap)
          4. Every folder has index.md
          5. story-driven docs have provenance: field
          Exits non-zero on failure. Can be added to pre-commit or CI.
      - name: Add generate-doc-indexes.sh to pre-commit or sync-skills.sh
        verify: "grep -q 'generate-doc-indexes' scripts/sync-skills.sh 2>/dev/null || echo 'Manual: wire into CI/pre-commit'"
        description: |
          Ensure index.md files stay in sync. Options:
          - Add to scripts/sync-skills.sh (if it exists)
          - Add as pre-commit hook
          - Add as CI step in ci-cd-monorepo.yml
