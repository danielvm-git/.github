story_id: e01s02
title: Refactor existing docs to Good Docs templates + OKF frontmatter
status: done
bcps: 8

tasks:
  - id: 1
    description: "Add OKF frontmatter to all existing docs"
    verify: "for f in docs/concept/*.md docs/how-to/*.md docs/reference/*.md docs/tutorial/*.md docs/api-reference/*.md; do [[ $f == */index.md || $f == */log.md ]] && continue; grep -q '^---' $f || echo MISSING_FRONTMATTER: $f; done"
    risk: P3
    status: done
    allure:
      severity: normal
      categories:
        - "Docs"

  - id: 2
    description: "Convert explanation/ docs to concept/ with Good Docs concept template"
    verify: "grep -q 'type: Concept' docs/concept/bigpowers-methodology-overview.md"
