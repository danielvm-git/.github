name: CI (Monorepo)
# version: 1.0.0 — see workflow-templates/CHANGELOG.md
# Multi-language monorepo — discovers and runs the right CI per subdirectory.
# For repos with mixed stacks (e.g. Python backend + Vue frontend).

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Node.js / TypeScript — if package.json exists
  node:
    if: hashFiles('package.json') != ''
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run typecheck --if-present
      - run: npm test --if-present

  # Python — if pyproject.toml or requirements.txt exists
  python:
    if: hashFiles('pyproject.toml', 'requirements.txt') != ''
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install ruff pytest
      - run: ruff check . --if-present
      - run: pytest --if-present

  # Rust — if Cargo.toml exists
  rust:
    if: hashFiles('Cargo.toml') != ''
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy -- -D warnings
      - run: cargo test

  # Go — if go.mod exists
  go:
    if: hashFiles('go.mod') != ''
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
      - run: go vet ./...
      - run: go test ./...

  # Shell — if .sh files exist
  shell:
    if: hashFiles('**/*.sh') != ''
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - run: shellcheck **/*.sh
