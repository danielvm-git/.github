name: CI

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.22'

jobs:
  test:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '${{ env.GO_VERSION }}'
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -timeout 120s

  lint:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '${{ env.GO_VERSION }}'
      - name: golangci-lint
        # TODO: pin to full commit SHA before first use (see
        # docs/explanation/github-actions-best-practices.md — third-party
        # actions with write access get pinned; this one is read-only lint,
        # lower priority, but still worth doing for consistency).
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
