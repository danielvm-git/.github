name: CI (Python — uv)
# For Python projects using uv instead of pip. Mirrors ci-python.yml but
# replaces pip install with uv sync and uses `just` or `uv run` for tasks.
# If your project uses pip + requirements.txt, use ci-python.yml instead.

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --group dev
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy src/
      - name: Test
        run: uv run pytest -q
      - name: Build (if applicable)
        run: uv build || echo "No build step defined"
