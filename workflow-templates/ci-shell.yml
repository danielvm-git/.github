name: CI
# For shell/CLI-only projects (e.g. dev-checklist). Lifted from the shellcheck
# step already running inside big-token-saver's ci.yml — extracted here so
# pure-shell projects don't need a Rust/Node toolchain just to lint.

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # shellcheck is pre-installed on ubuntu runners
      - name: ShellCheck
        run: shellcheck **/*.sh

      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats

      - name: Run bats tests
        run: |
          if [ -d tests ] && ls tests/*.bats >/dev/null 2>&1; then
            bats tests/*.bats
          else
            echo "No .bats tests found — skipping"
          fi
