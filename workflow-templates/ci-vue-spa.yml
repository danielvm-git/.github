name: CI/CD
# version: 1.0.0 — see workflow-templates/CHANGELOG.md
# Extracted from 3 near-identical live workflows: big-dock-locker-site,
# big-olive-books, clean-install-guide. Consolidates them into one template
# using scoped-token auth (not the email/password pattern some of the
# originals used) and the shared bigbase-deploy action.

on:
  push:
    branches: [main, develop, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  SITE_URL: "https://CHANGE-ME.bigbase.click"

jobs:
  ci-cd:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx vue-tsc -b

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist/
          retention-days: 3

      # Deploy via shared bigbase-deploy action (scoped token, masked, retry-based health check)
      - name: Deploy to BigBase
        uses: danielvm-git/.github/actions/bigbase-deploy@main
        with:
          site_id: ${{ secrets.BIGBASE_SITE_ID }}
          app_type: static
          site_url: ${{ env.SITE_URL }}
          deploy_token: ${{ secrets.BIGBASE_DEPLOY_TOKEN }}
