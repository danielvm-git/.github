name: CI/CD
# Extracted from 3 near-identical live workflows: big-dock-locker-site,
# big-olive-books, clean-install-guide. Consolidates them into one template
# using scoped-token auth (not the email/password pattern some of the
# originals used) and the shared bigbase-deploy action.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  SITE_URL: "https://CHANGE-ME.bigbase.click"

jobs:
  ci-cd:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx vue-tsc -b

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist/
          retention-days: 3

      # Replace with: uses: danielvm-git/.github/actions/bigbase-deploy@<sha>
      - name: Deploy to BigBase
        env:
          BIGBASE_SERVER: "https://bigbase.click"
          BIGBASE_DEPLOY_TOKEN: ${{ secrets.BIGBASE_DEPLOY_TOKEN }}
          BIGBASE_SITE_ID: ${{ secrets.BIGBASE_SITE_ID }}
        run: |
          if [ -z "$BIGBASE_DEPLOY_TOKEN" ]; then
            echo "::error::BIGBASE_DEPLOY_TOKEN not set — provision via bigbase_provision_ci_credentials"
            exit 1
          fi
          curl -sfX POST "$BIGBASE_SERVER/api/sites/$BIGBASE_SITE_ID/deploy" \
            -H "Authorization: Bearer $BIGBASE_DEPLOY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"branch":"main","app_type":"static"}'

      - name: Health check
        run: |
          for i in $(seq 1 8); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${{ env.SITE_URL }}")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
              echo "✅ Site LIVE (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, waiting 10s..."
            sleep 10
          done
          echo "::error::Health check failed after 8 attempts"
          exit 1
