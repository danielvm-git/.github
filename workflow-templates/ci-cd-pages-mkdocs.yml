name: CI/CD (Docs)
# version: 2.0.0 — see workflow-templates/CHANGELOG.md

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]

permissions:
  contents: read

concurrency:
  group: pipeline-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install mkdocs-material
        run: pip install mkdocs-material

      - name: Build docs
        run: mkdocs build --config-file docs/mkdocs.yml

  verify:
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Preflight
        run: |
          if [ -f scripts/preflight.sh ]; then
            bash scripts/preflight.sh
          else
            echo "WARN: No preflight script found"
          fi

      - name: Check Conventional Commits
        run: |
          git log origin/main..HEAD --oneline | while read -r line; do
            if ! echo "$line" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: "; then
              echo "FAIL: Non-conventional commit: $line"
              exit 1
            fi
          done
          echo "PASS: All commits follow Conventional Commits"

      - name: Check no AI agent attribution
        run: |
          if git log origin/main..HEAD --format="%B" | grep -qiE '^co[- ]authored[- ]by:'; then
            echo "FAIL: Co-authored-by: footer found"
            exit 1
          fi
          echo "PASS: No AI agent attribution"

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [ci, verify]
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install mkdocs-material
        run: pip install mkdocs-material

      - name: Build docs
        run: mkdocs build --config-file docs/mkdocs.yml

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy_attempt_1
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before retry
        if: steps.deploy_attempt_1.outcome == 'failure'
        run: sleep 45

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy_attempt_2
        if: steps.deploy_attempt_1.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Verify deployment succeeded
        id: deployment
        run: |
          if [ "${{ steps.deploy_attempt_1.outcome }}" = "success" ] || \
             [ "${{ steps.deploy_attempt_2.outcome }}" = "success" ]; then
            echo "GitHub Pages deployment succeeded"
          else
            echo "::error::GitHub Pages deployment failed after 2 attempts"
            exit 1
          fi
