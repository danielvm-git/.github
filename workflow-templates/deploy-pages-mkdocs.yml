name: Deploy Documentation
# Lifted from grimoire/.github/workflows/docs.yaml (MkDocs). Use this for
# Python/MkDocs docs sites. For Node/Astro Starlight docs sites, use
# deploy-pages-starlight.yml (from bigpowers/website) instead.

on:
  push:
    branches: [main, develop, master]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-pages-mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install mkdocs-material
        run: pip install mkdocs-material

      - name: Build docs
        run: mkdocs build --config-file docs/mkdocs.yml

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy_attempt_1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry
        if: steps.deploy_attempt_1.outcome == 'failure'
        run: sleep 45

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy_attempt_2
        if: steps.deploy_attempt_1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before final retry
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        run: sleep 45

      - name: Deploy to GitHub Pages (attempt 3)
        id: deploy_attempt_3
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Verify deployment succeeded
        id: deployment
        run: |
          if [ "${{ steps.deploy_attempt_1.outcome }}" = "success" ] || \
             [ "${{ steps.deploy_attempt_2.outcome }}" = "success" ] || \
             [ "${{ steps.deploy_attempt_3.outcome }}" = "success" ]; then
            echo "GitHub Pages deployment succeeded"
          else
            echo "::error::GitHub Pages deployment failed after 3 attempts"
            exit 1
          fi
