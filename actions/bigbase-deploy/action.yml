name: 'bigbase-deploy'
description: >
  Deploy a built site/app to bigbase.click. Consolidates the pattern found
  live in astrobiologia, big-bolao, big-library, and big-olive-books into
  one hardened step: scoped token auth (never email/password), token
  masking, and a single retry-based health check.

inputs:
  site_id:
    description: 'BigBase site ID (secrets.BIGBASE_SITE_ID recommended, not hardcoded)'
    required: true
  app_type:
    description: 'static | python | node | go'
    required: true
  site_url:
    description: 'Full URL to health-check after deploy (e.g. https://myapp.bigbase.click)'
    required: true
  deploy_token:
    description: 'Scoped BigBase deploy token (secrets.BIGBASE_DEPLOY_TOKEN). Provision via bigbase_provision_ci_credentials — do NOT use account email/password.'
    required: true
  bigbase_server:
    description: 'BigBase server base URL'
    required: false
    default: 'https://bigbase.click'
  branch:
    description: 'Branch to deploy'
    required: false
    default: 'main'
  passthrough_paths:
    description: 'JSON array of URL paths to pass through to the origin server (e.g. ["/api/version","/mcp"])'
    required: false
    default: '[]'
  health_check_attempts:
    required: false
    default: '8'
  health_check_interval_seconds:
    required: false
    default: '10'

runs:
  using: 'composite'
  steps:
    - name: Validate token present
      shell: bash
      run: |
        if [ -z "${{ inputs.deploy_token }}" ]; then
          echo "::error::deploy_token not set. Provision a scoped token via bigbase_provision_ci_credentials — do not use account email/password."
          exit 1
        fi

    - name: Mask token
      shell: bash
      run: echo "::add-mask::${{ inputs.deploy_token }}"

    - name: Trigger BigBase deploy
      shell: bash
      run: |
        PAYLOAD=$(jq -n \
          --arg branch "${{ inputs.branch }}" \
          --arg app_type "${{ inputs.app_type }}" \
          --argjson passthrough "${{ inputs.passthrough_paths }}" \
          '{branch: $branch, app_type: $app_type, passthrough_paths: $passthrough}')
        curl -sfX POST "${{ inputs.bigbase_server }}/api/sites/${{ inputs.site_id }}/deploy" \
          -H "Authorization: Bearer ${{ inputs.deploy_token }}" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD"

    - name: Health check
      shell: bash
      run: |
        ATTEMPTS=${{ inputs.health_check_attempts }}
        INTERVAL=${{ inputs.health_check_interval_seconds }}
        for i in $(seq 1 "$ATTEMPTS"); do
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${{ inputs.site_url }}")
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
            echo "✅ Site LIVE (HTTP $STATUS)"
            exit 0
          fi
          echo "Attempt $i/$ATTEMPTS: HTTP $STATUS, waiting ${INTERVAL}s..."
          sleep "$INTERVAL"
        done
        echo "::error::Health check failed after $ATTEMPTS attempts"
        exit 1
