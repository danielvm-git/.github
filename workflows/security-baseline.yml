name: security-baseline
# Documents the 3 security defaults missing from 52-83% of the portfolio's
# workflows (see docs/reference/audit-history/2026-07-audit.md).
#
# NOT a reusable workflow — permissions/concurrency are workflow-level,
# not composable via workflow_call. Copy these three blocks into every
# new workflow instead. For enforcement across the portfolio, run:
#   ./scripts/audit-workflows.sh
#
# The 3 blocks to copy:
#
# 1) Top of every workflow file:
#
# permissions:
#   contents: read
#
# 2) Top-level, one per workflow (CI: cancel; deploy: queue, don't cancel):
#
# concurrency:
#   group: ci-${{ github.workflow }}-${{ github.ref }}
#   cancel-in-progress: true   # false for deploy workflows
#
# 3) Every job:
#
# jobs:
#   your-job:
#     timeout-minutes: 15   # 10-15 CI, 20-30 deploy

on:
  workflow_call: {}
