name: Bug Report
description: Report a bug or unexpected behavior
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the sections below.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Run `...`
        2. Open `...`
        3. See error
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime version, relevant tool versions.
      placeholder: |
        - OS: macOS 15
        - Node: 24.x
        - Project version: v2.1.0
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste any error messages, stack traces, or terminal output.
      render: shell
