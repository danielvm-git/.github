name: Feature Request
description: Propose a new feature or enhancement
title: "feat: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the feature suggestion. Please describe the problem and your proposed solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Why is it valuable?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should be built? How would it work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, related issues.
